<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SoftPrime Orçamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0d7de0;
      --primary-dark: #0a5fb8;
      --primary-rgb: 13, 125, 224;
      --glow: rgba(13,125,224,0.6);
      --card-bg: rgba(6, 18, 36, 0.72);
      --border-glow: rgba(13,125,224,0.35);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Exo 2', 'Segoe UI', sans-serif;
      background: #020b18;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Canvas animado ── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Scanline overlay ── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0.06) 4px
      );
    }

    /* ── Login card ── */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 420px;
      max-width: calc(100vw - 32px);
      background: var(--card-bg);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border-radius: 16px;
      padding: 36px 32px 32px;
      border: 1px solid var(--border-glow);
      box-shadow:
        0 0 0 1px rgba(13,125,224,0.08),
        0 8px 32px rgba(0,0,0,0.6),
        0 0 60px rgba(13,125,224,0.08),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ── */
    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(var(--primary-rgb), 0.4);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(var(--primary-rgb), 0.4); }
      50%       { box-shadow: 0 4px 28px rgba(var(--primary-rgb), 0.7); }
    }

    .logo-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .logo-name span { color: var(--primary); }

    .login-subtitle {
      font-size: 13px;
      color: rgba(180, 210, 255, 0.55);
      letter-spacing: 0.5px;
    }

    /* ── Tabs ── */
    .login-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }

    .tab-btn.active { color: var(--primary); }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 15%;
      right: 15%;
      height: 2px;
      background: var(--primary);
      border-radius: 2px 2px 0 0;
      box-shadow: 0 0 8px var(--glow);
    }

    /* ── Form fields ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(150, 190, 255, 0.7);
    }

    .field-inner {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-inner input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border-radius: 9px;
      border: 1.5px solid rgba(13,125,224,0.2);
      background: rgba(5, 15, 35, 0.6);
      color: #e8f4ff;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .field-inner input::placeholder { color: rgba(100, 150, 200, 0.4); }

    .field-inner input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.15), 0 0 12px rgba(var(--primary-rgb), 0.1);
    }

    .field-icon {
      position: absolute;
      left: 13px;
      font-size: 15px;
      opacity: 0.5;
      pointer-events: none;
    }

    .field-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(100,150,200,0.5);
      font-size: 15px;
      padding: 4px;
      transition: color 0.2s;
    }
    .field-btn:hover { color: var(--primary); }

    /* ── Submit button ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      border-radius: 9px;
      border: none;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(var(--primary-rgb), 0.35);
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(var(--primary-rgb), 0.5); }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    /* ── Forgot ── */
    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: rgba(100,160,255,0.6);
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer;
    }
    .forgot-link:hover { color: var(--primary); }

    /* ── Footer ── */
    .login-footer {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
      font-size: 12px;
      color: rgba(100,140,190,0.4);
      letter-spacing: 0.3px;
    }

    @media (max-width: 480px) {
      .login-wrap { padding: 28px 20px 24px; }
    }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="login-wrap">

    <div class="login-header">
      <div class="login-logo">
        <div class="logo-icon">🔷</div>
        <div class="logo-name">Soft<span>Prime</span></div>
      </div>
      <p class="login-subtitle">Gerador de Orçamentos — Faça login ou crie sua conta</p>
    </div>

    <div class="login-tabs">
      <button class="tab-btn active" onclick="switchTab(this)">Login</button>
      <button class="tab-btn" onclick="switchTab(this)">Cadastrar</button>
    </div>

    <form id="loginForm" onsubmit="return false">
      <div class="field-group">

        <div class="field">
          <label>E-mail ou Usuário</label>
          <div class="field-inner">
            <span class="field-icon">👤</span>
            <input type="text" id="emailInput" placeholder="E-mail ou nome de usuário" autocomplete="username">
          </div>
        </div>

        <div class="field">
          <label>Senha</label>
          <div class="field-inner">
            <span class="field-icon">🔒</span>
            <input type="password" id="passwordInput" placeholder="Mínimo 6 caracteres" autocomplete="current-password">
            <button class="field-btn" type="button" onclick="togglePass()" title="Mostrar senha">👁</button>
          </div>
        </div>

      </div>

      <button class="btn-login" type="submit">🔐 &nbsp;Entrar</button>
      <a class="forgot-link">Esqueci minha senha</a>
    </form>

    <div class="login-footer">© 2026 SoftPrime — Todos os direitos reservados</div>
  </div>

  <script>
    /* ─────────────────────────────────────────────
       CANVAS FUTURISTA — zero dependências externas
       Grid animada com perspectiva + partículas
       flutuantes + raios de luz + brilho central
    ───────────────────────────────────────────── */
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, raf, frame_n = 0;

      // ── helpers ──
      function rand(a, b) { return Math.random() * (b - a) + a; }

      // ── Partículas ──
      const PARTICLE_COUNT = 100;
      const particles = [];

      class Particle {
        constructor() { this.reset(true); }
        reset(init) {
          this.x  = rand(0, W || 800);
          this.y  = init ? rand(0, H || 600) : rand(-10, (H || 600) * 0.2);
          this.vx = rand(-0.25, 0.25);
          this.vy = rand(0.12, 0.55);
          this.r  = rand(0.4, 2.0);
          this.a  = rand(0.15, 0.65);
          this.col = Math.random() > 0.55 ? '#7ef9ff' : '#0d7de0';
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.y > H + 5) this.reset(false);
          if (this.x < 0) this.x = W;
          if (this.x > W) this.x = 0;
        }
        draw() {
          ctx.save();
          ctx.globalAlpha = this.a;
          ctx.shadowColor = this.col;
          ctx.shadowBlur = 7;
          ctx.fillStyle = this.col;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      // ── Raios de luz ──
      const RAYS = 7;
      const rays = Array.from({ length: RAYS }, (_, i) => ({
        angle : (i / RAYS) * Math.PI * 2 + rand(0, 0.6),
        speed : rand(0.0003, 0.0007) * (Math.random() > .5 ? 1 : -1),
        len   : rand(0.4, 0.72),
        alpha : rand(0.02, 0.055),
        width : rand(70, 170)
      }));

      // ── Grid com scroll vertical (perspectiva) ──
      let gridTick = 0;

      function drawGrid() {
        const COLS = 22, ROWS = 16;
        const cw = W / COLS;
        const ch = H / ROWS;
        gridTick += 0.22;
        const offset = gridTick % ch;

        ctx.save();
        ctx.lineWidth = 0.6;

        // verticais estáticas
        ctx.strokeStyle = 'rgba(13,125,224,0.065)';
        ctx.globalAlpha = 1;
        for (let c = 0; c <= COLS; c++) {
          ctx.beginPath();
          ctx.moveTo(c * cw, 0);
          ctx.lineTo(c * cw, H);
          ctx.stroke();
        }

        // horizontais com scroll e fade por posição
        for (let r = -1; r <= ROWS + 1; r++) {
          const y = r * ch + offset;
          const t = y / H;                         // 0..1
          const fade = Math.sin(t * Math.PI);      // 0→1→0
          ctx.globalAlpha = fade * 0.1;
          ctx.strokeStyle = `rgba(13,125,224,1)`;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawRays() {
        const cx = W * 0.5, cy = H * 0.5;
        rays.forEach(r => {
          r.angle += r.speed;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(r.angle);
          const g = ctx.createLinearGradient(0, 0, W * r.len, 0);
          g.addColorStop(0,   `rgba(13,125,224,${r.alpha})`);
          g.addColorStop(0.6, `rgba(13,125,224,${r.alpha * 0.3})`);
          g.addColorStop(1,   'rgba(13,125,224,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.moveTo(0, -r.width * 0.5);
          ctx.lineTo(W * r.len, -r.width * 0.04);
          ctx.lineTo(W * r.len,  r.width * 0.04);
          ctx.lineTo(0,  r.width * 0.5);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });
      }

      function drawGlow() {
        // brilho central pulsante
        const pulse = 0.95 + 0.05 * Math.sin(frame_n * 0.018);
        const cx = W * 0.5, cy = H * 0.46;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.52 * pulse);
        g.addColorStop(0,   'rgba(13,100,210,0.14)');
        g.addColorStop(0.45,'rgba(10,70,160,0.05)');
        g.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }

      function tick() {
        frame_n++;
        ctx.clearRect(0, 0, W, H);

        // fundo sólido escuro
        ctx.fillStyle = '#020b18';
        ctx.fillRect(0, 0, W, H);

        drawGrid();
        drawGlow();
        drawRays();
        particles.forEach(p => { p.update(); p.draw(); });

        raf = requestAnimationFrame(tick);
      }

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function init() {
        resize();
        particles.length = 0;
        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        cancelAnimationFrame(raf);
        tick();
      }

      window.addEventListener('resize', init);
      init();
    })();

    /* ── UI ── */
    function togglePass() {
      const i = document.getElementById('passwordInput');
      i.type = i.type === 'password' ? 'text' : 'password';
    }

    function switchTab(btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
