<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SoftPrime Orçamentos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background-color: #020b18;
      background-image: url('bg-login2.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(2, 11, 30, 0.45);
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 1;
      background: rgba(5, 20, 50, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 40px;
      border-radius: 20px;
      box-shadow:
        0 0 0 1px rgba(0, 180, 255, 0.25),
        0 8px 40px rgba(0, 140, 255, 0.2),
        0 20px 60px rgba(0, 0, 0, 0.5);
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(0, 180, 255, 0.2);
    }

    .logo { text-align: center; margin-bottom: 30px; }

    .logo h1 {
      color: #00c8ff;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0,200,255,0.8), 0 0 30px rgba(0,140,255,0.5);
      margin-bottom: 6px;
    }

    .logo p { color: rgba(180,220,255,0.8); font-size: 14px; }
    .logo .subtitle { font-size: 12px; margin-top: 6px; color: rgba(100,180,255,0.6); }

    .tabs {
      display: flex;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(0,180,255,0.2);
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      background: none;
      border: none;
      color: rgba(150,200,255,0.6);
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      letter-spacing: 0.5px;
    }

    .tab.active {
      color: #00c8ff;
      border-bottom-color: #00c8ff;
      text-shadow: 0 0 8px rgba(0,200,255,0.6);
    }

    .tab:hover { color: #00c8ff; }

    .form-container { display: none; }
    .form-container.active { display: block; }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: rgba(150,210,255,0.9);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(0,180,255,0.25);
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
      background: rgba(0,30,70,0.6);
      color: #e0f0ff;
    }

    .form-group input::placeholder { color: rgba(100,160,220,0.5); }

    .form-group input:focus {
      outline: none;
      border-color: #00c8ff;
      background: rgba(0,40,90,0.7);
      box-shadow: 0 0 0 3px rgba(0,200,255,0.15), 0 0 15px rgba(0,150,255,0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0078d4, #00c8ff);
      color: white;
      box-shadow: 0 4px 20px rgba(0,180,255,0.35), 0 0 0 1px rgba(0,200,255,0.2);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #0090f0, #40d8ff);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,180,255,0.5), 0 0 20px rgba(0,200,255,0.3);
    }

    .btn-primary:disabled {
      background: rgba(0,100,180,0.4);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 14px;
      display: none;
      border: 1px solid transparent;
    }

    .alert.show { display: block; }
    .alert-error { background: rgba(200,30,30,0.2); color: #ff8080; border-color: rgba(255,80,80,0.3); }
    .alert-success { background: rgba(0,180,100,0.2); color: #80ffb0; border-color: rgba(0,220,120,0.3); }

    .forgot-password { text-align: center; margin-top: 16px; }

    .forgot-password a {
      color: rgba(0,180,255,0.7);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    .forgot-password a:hover { color: #00c8ff; text-shadow: 0 0 8px rgba(0,200,255,0.5); }

    .loading {
      display: inline-block;
      width: 16px; height: 16px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .password-field-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-field-wrap input {
      width: 100%;
      padding-right: 44px;
    }

    .btn-toggle-password {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: rgba(255,255,255,0.5);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .btn-toggle-password:hover {
      color: rgba(255,255,255,0.9);
    }

    .eye-icon {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>⚡ SoftPrime</h1>
      <p>Gerador de Orçamentos</p>
      <p class="subtitle">Faça login ou crie sua conta</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Login</button>
      <button class="tab" onclick="showTab('cadastro')">Cadastrar</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <div id="loginForm" class="form-container active">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email ou Usuário</label>
          <input type="text" id="loginIdentifier" placeholder="seu@email.com ou nome de usuário" autocomplete="off" spellcheck="false" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <div class="password-field-wrap">
            <input type="password" id="loginPassword" placeholder="Mínimo 6 caracteres" autocomplete="current-password" required>
            <button type="button" class="btn-toggle-password" onclick="togglePassword('loginPassword', this)" title="Mostrar/ocultar senha" aria-label="Mostrar senha">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">🔐 Entrar</button>
      </form>
      <div class="forgot-password">
        <a href="#" onclick="handleForgotPassword(event)">Esqueci minha senha</a>
      </div>
    </div>

    <div id="cadastroForm" class="form-container">
      <form onsubmit="handleSignUp(event)">
        <div class="form-group">
          <label>Nome Completo</label>
          <input type="text" id="signupName" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label for="signupUsername">Nome de Usuário</label>
          <input type="text" id="signupUsername" placeholder="ex: joaosilva123" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha (mínimo 6 caracteres)</label>
          <div class="password-field-wrap">
            <input type="password" id="signupPassword" placeholder="Escolha uma senha forte" autocomplete="new-password" required minlength="6">
            <button type="button" class="btn-toggle-password" onclick="togglePassword('signupPassword', this)" title="Mostrar/ocultar senha" aria-label="Mostrar senha">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="signupBtn">Criar Conta</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (!input) return;

      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.setAttribute('aria-label', isHidden ? 'Ocultar senha' : 'Mostrar senha');

      const svg = btn.querySelector('svg');
      if (isHidden) {
        svg.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      } else {
        svg.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }

    function showTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const cadastroForm = document.getElementById('cadastroForm');
      const tabs = document.querySelectorAll('.tab');
      tabs.forEach(t => t.classList.remove('active'));
      if (tab === 'login') {
        loginForm.classList.add('active');
        cadastroForm.classList.remove('active');
        tabs[0].classList.add('active');
      } else {
        cadastroForm.classList.add('active');
        loginForm.classList.remove('active');
        tabs[1].classList.add('active');
      }
      hideAlert();
    }

    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type} show`;
    }

    function hideAlert() {
      document.getElementById('alertBox').className = 'alert';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await new Promise(resolve => setTimeout(resolve, 500));
      if (window.authManager && window.authManager.isAuthenticated()) {
        window.location.href = 'index.html';
      }
    });

    async function handleLogin(event) {
      event.preventDefault();
      hideAlert();
      const identifier = document.getElementById('loginIdentifier').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      if (!identifier) {
        showAlert('Informe seu email ou nome de usuário.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Entrando...';
      const result = await window.authManager.signIn(identifier, password);
      if (result.success) {
        showAlert('✅ Login realizado! Redirecionando...', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } else {
        showAlert(result.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '🔐 Entrar';
      }
    }

    async function handleSignUp(event) {
      event.preventDefault();
      hideAlert();
      const name = document.getElementById('signupName').value.trim();
      const username = document.getElementById('signupUsername').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Criando conta...';
      const result = await window.authManager.signUp(email, password, name, username);
      if (result.success) {
        showAlert('✅ Conta criada! Faça login agora.', 'success');
        setTimeout(() => {
          showTab('login');
          document.getElementById('loginIdentifier').value = email;
          btn.disabled = false;
          btn.innerHTML = 'Criar Conta';
        }, 2000);
      } else {
        showAlert(result.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Criar Conta';
      }
    }

    async function handleForgotPassword(event) {
      event.preventDefault();
      const identifier = document.getElementById('loginIdentifier').value.trim();
      // Se o campo tem um username (sem @), pede o email diretamente
      const email = (identifier && identifier.includes('@'))
        ? identifier
        : prompt('Digite seu email para recuperação de senha:');
      if (email) {
        const result = await window.authManager.resetPassword(email);
        showAlert(result.message, result.success ? 'success' : 'error');
      }
    }
  </script>
</body>
</html>
