<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - SoftPrime Orçamentos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0d7de0;
      --primary-dark: #0a5fb8;
      --primary-rgb: 13, 125, 224;
      --glow: rgba(13,125,224,0.6);
      --card-bg: rgba(6, 18, 36, 0.72);
      --border-glow: rgba(13,125,224,0.35);
      --accent-muted: rgba(180,210,255,0.55);
    }

    html, body { height: 100%; }
    body {
      font-family: 'Exo 2', 'Segoe UI', sans-serif;
      background: #020b18;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Canvas background (preserved) */
    #bgCanvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .scanlines { position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    }

    /* Card */
    .login-wrap {
      position: relative; z-index: 10; width: 420px; max-width: calc(100vw - 32px);
      background: var(--card-bg);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border-radius: 16px;
      padding: 36px 32px 32px;
      border: 1px solid var(--border-glow);
      box-shadow: 0 0 0 1px rgba(13,125,224,0.08), 0 8px 32px rgba(0,0,0,0.6), 0 0 60px rgba(13,125,224,0.08);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(28px) scale(0.97);} to { opacity:1; transform:translateY(0) scale(1);} }

    .login-header { text-align:center; margin-bottom: 28px; }
    .login-logo { display:inline-flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; }
    .logo-icon {
      width:44px; height:44px; background: linear-gradient(135deg,var(--primary),var(--primary-dark));
      border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px;
      box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.4);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.4); }
      50% { box-shadow: 0 4px 28px rgba(var(--primary-rgb),0.7); }
    }
    .logo-name { font-size:22px; font-weight:700; color:#fff; letter-spacing:1px; text-transform:uppercase; }
    .logo-name span { color: var(--primary); }
    .login-subtitle { font-size:13px; color: var(--accent-muted); letter-spacing:0.5px; }

    .login-tabs { display:flex; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 24px; }
    .tab-btn {
      flex:1; background:none; border:none; padding:10px; font-family:inherit; font-size:14px; font-weight:600;
      color: rgba(255,255,255,0.4); cursor:pointer; position:relative; letter-spacing:0.3px;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-btn.active::after { content:''; position:absolute; bottom:-1px; left:15%; right:15%; height:2px; background:var(--primary); border-radius:2px; box-shadow:0 0 8px var(--glow); }

    /* Form fields */
    .field-group { display:flex; flex-direction:column; gap:16px; margin-bottom:20px; }
    .field label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color: rgba(150,190,255,0.7); margin-bottom:6px; display:block; }
    .field-inner { position:relative; display:flex; align-items:center; }
    .field-inner input {
      width:100%; padding:11px 14px 11px 42px; border-radius:9px; border:1.5px solid rgba(13,125,224,0.2);
      background: rgba(5,15,35,0.6); color:#e8f4ff; font-size:14px; transition:border-color 0.2s, box-shadow 0.2s; outline:none;
    }
    .field-inner input::placeholder { color: rgba(100,150,200,0.4); }
    .field-inner input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb),0.15), 0 0 12px rgba(var(--primary-rgb),0.1); }
    .field-icon { position:absolute; left:13px; font-size:15px; opacity:0.6; pointer-events:none; }
    .field-btn { position:absolute; right:10px; background:none; border:none; cursor:pointer; color: rgba(100,150,200,0.5); font-size:15px; padding:4px; transition: color 0.2s; }
    .field-btn:hover { color: var(--primary); }

    /* NEW: remember + actions row (redesign solicitado) */
    .actions-row {
      display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:6px; margin-bottom:18px;
    }
    .remember {
      display:flex; align-items:center; gap:10px; color: rgba(200,220,255,0.8); font-size:13px;
    }
    /* Custom toggle */
    .toggle {
      --w: 44px; --h: 24px; --pad: 3px;
      position:relative; width:var(--w); height:var(--h); border-radius:999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.06));
      border: 1px solid rgba(255,255,255,0.06);
      display:inline-flex; align-items:center; padding:var(--pad);
      transition: all 0.22s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      cursor:pointer;
    }
    .toggle .knob {
      width: calc(var(--h) - var(--pad)*2);
      height: calc(var(--h) - var(--pad)*2);
      border-radius:50%;
      background: #fff;
      transform: translateX(0);
      transition: transform 0.22s cubic-bezier(.2,.9,.3,1), background 0.22s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.45);
    }
    .toggle.on {
      background: linear-gradient(90deg, rgba(var(--primary-rgb),0.95), rgba(var(--primary-rgb),0.6));
      box-shadow: 0 6px 20px rgba(var(--primary-rgb),0.18), 0 0 18px rgba(var(--primary-rgb),0.08);
      border-color: rgba(var(--primary-rgb),0.32);
    }
    .toggle.on .knob { transform: translateX(calc(var(--w) - var(--h))); background: linear-gradient(135deg,#fff,#e6f6ff); }

    /* Forgot link (right) */
    .forgot-link-inline { color: rgba(100,160,255,0.7); text-decoration:none; font-size:13px; }
    .forgot-link-inline:hover { color: var(--primary); text-decoration:underline; }

    /* Button area (enhanced) */
    .btn-wrap { margin-top:6px; position:relative; }
    .btn-login {
      width:100%; padding:13px; border-radius:12px; border:none;
      background: linear-gradient(135deg,var(--primary) 0%, var(--primary-dark) 100%);
      color:#fff; font-family:inherit; font-size:15px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 10px 30px rgba(var(--primary-rgb),0.28), inset 0 -4px 24px rgba(255,255,255,0.03);
      position:relative; overflow:hidden;
    }
    .btn-login:active { transform: translateY(1px) scale(0.998); }
    /* subtle rim */
    .btn-login::after {
      content:''; position:absolute; inset:0; border-radius:12px; pointer-events:none;
      box-shadow: 0 0 36px rgba(var(--primary-rgb),0.08) inset;
      mix-blend-mode: screen;
    }
    /* ripple */
    .ripple {
      position:absolute; border-radius:50%; transform: scale(0.2); background: rgba(255,255,255,0.15);
      animation: rippleAnim 0.7s ease-out;
      pointer-events:none;
    }
    @keyframes rippleAnim { to { transform: scale(2.8); opacity: 0; } }

    /* secure note below button */
    .secure-note {
      margin-top:12px; text-align:center; font-size:12px; color: rgba(180,210,255,0.45);
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .secure-note .dot { width:8px; height:8px; background: linear-gradient(135deg,var(--primary),var(--primary-dark)); border-radius:50%; box-shadow:0 0 6px rgba(var(--primary-rgb),0.4); }

    /* Footer */
    .login-footer { margin-top:18px; padding-top:18px; border-top: 1px solid rgba(255,255,255,0.06); text-align:center; font-size:12px; color: rgba(100,140,190,0.4); }

    @media (max-width:480px) {
      .login-wrap { padding:28px 20px 24px; }
      .actions-row { flex-direction:column; align-items:stretch; gap:10px; }
      .forgot-link-inline { text-align:right; display:block; }
    }
  </style>
</head>
<body>

  <!-- preserve background canvas -->
  <canvas id="bgCanvas"></canvas>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo">
        <div class="logo-icon">🔷</div>
        <div class="logo-name">Soft<span>Prime</span></div>
      </div>
      <p class="login-subtitle">Gerador de Orçamentos — Faça login ou crie sua conta</p>
    </div>

    <div class="login-tabs">
      <button class="tab-btn active" onclick="switchTab(this)">Login</button>
      <button class="tab-btn" onclick="switchTab(this)">Cadastrar</button>
    </div>

    <form id="loginForm" onsubmit="return false;">
      <div class="field-group">
        <div class="field">
          <label for="emailInput">E-mail ou Usuário</label>
          <div class="field-inner">
            <span class="field-icon">👤</span>
            <input id="emailInput" type="text" placeholder="E-mail ou nome de usuário" autocomplete="username" />
          </div>
        </div>

        <div class="field">
          <label for="passwordInput">Senha</label>
          <div class="field-inner">
            <span class="field-icon">🔒</span>
            <input id="passwordInput" type="password" placeholder="••••••••" autocomplete="current-password" />
            <button class="field-btn" type="button" onclick="togglePass()" title="Mostrar senha">👁</button>
          </div>
        </div>
      </div>

      <!-- ---- actions row (redesenhada) ---- -->
      <div class="actions-row">
        <label class="remember" id="rememberLabel" role="checkbox" aria-checked="false" tabindex="0">
          <div id="rememberToggle" class="toggle" onclick="toggleRemember()" onkeydown="keyToggleRemember(event)">
            <div class="knob"></div>
          </div>
          <span>Manter conectado</span>
        </label>

        <a class="forgot-link-inline" href="#" onclick="onForgot(event)">Esqueceu sua senha?</a>
      </div>

      <!-- enhanced button area -->
      <div class="btn-wrap">
        <button id="submitBtn" class="btn-login" type="submit" aria-label="Entrar"> &nbsp;INICIAR SESSÃO</button>
        <div class="secure-note"><span class="dot" aria-hidden="true"></span><span>Ambiente seguro de autenticação</span></div>
      </div>
    </form>

    <div class="login-footer">© 2026 SoftPrime — Todos os direitos reservados</div>
  </div>

  <script>
    /* ---------------------------
       Canvas futurista (preserve)
       This script is the animation engine for the background.
       It's unchanged from the version you already have (keeps your bg).
    ---------------------------- */
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, raf, frame_n = 0;

      function rand(a, b) { return Math.random() * (b - a) + a; }

      const PARTICLE_COUNT = 110;
      const particles = [];

      class Particle {
        constructor() { this.reset(true); }
        reset(init) {
          this.x  = rand(0, W || 800);
          this.y  = init ? rand(0, H || 600) : rand(-10, (H || 600) * 0.2);
          this.vx = rand(-0.25, 0.25);
          this.vy = rand(0.12, 0.55);
          this.r  = rand(0.4, 2.0);
          this.a  = rand(0.12, 0.65);
          this.col = Math.random() > 0.55 ? '#7ef9ff' : '#0d7de0';
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.y > H + 5) this.reset(false);
          if (this.x < -10) this.x = W + 10;
          if (this.x > W + 10) this.x = -10;
        }
        draw() {
          ctx.save();
          ctx.globalAlpha = this.a;
          ctx.shadowColor = this.col;
          ctx.shadowBlur = 8;
          ctx.fillStyle = this.col;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      const RAYS = 7;
      const rays = Array.from({ length: RAYS }, (_, i) => ({
        angle : (i / RAYS) * Math.PI * 2 + rand(0, 0.6),
        speed : rand(0.0003, 0.0007) * (Math.random() > .5 ? 1 : -1),
        len   : rand(0.4, 0.72),
        alpha : rand(0.02, 0.055),
        width : rand(70, 170)
      }));

      let gridTick = 0;

      function drawGrid() {
        const COLS = 22, ROWS = 16;
        const cw = W / COLS;
        const ch = H / ROWS;
        gridTick += 0.22;
        const offset = gridTick % ch;

        ctx.save();
        ctx.lineWidth = 0.6;

        ctx.strokeStyle = 'rgba(13,125,224,0.065)';
        ctx.globalAlpha = 1;
        for (let c = 0; c <= COLS; c++) {
          ctx.beginPath();
          ctx.moveTo(c * cw, 0);
          ctx.lineTo(c * cw, H);
          ctx.stroke();
        }

        for (let r = -1; r <= ROWS + 1; r++) {
          const y = r * ch + offset;
          const t = y / H;
          const fade = Math.sin(Math.max(0, Math.min(1, t)) * Math.PI);
          ctx.globalAlpha = Math.max(0, fade * 0.12);
          ctx.strokeStyle = `rgba(13,125,224,1)`;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawRays() {
        const cx = W * 0.5, cy = H * 0.5;
        rays.forEach(r => {
          r.angle += r.speed;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(r.angle);
          const g = ctx.createLinearGradient(0, 0, W * r.len, 0);
          g.addColorStop(0,   `rgba(13,125,224,${r.alpha})`);
          g.addColorStop(0.6, `rgba(13,125,224,${r.alpha * 0.3})`);
          g.addColorStop(1,   'rgba(13,125,224,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.moveTo(0, -r.width * 0.5);
          ctx.lineTo(W * r.len, -r.width * 0.04);
          ctx.lineTo(W * r.len,  r.width * 0.04);
          ctx.lineTo(0,  r.width * 0.5);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });
      }

      function drawGlow() {
        const pulse = 0.95 + 0.05 * Math.sin(frame_n * 0.018);
        const cx = W * 0.5, cy = H * 0.46;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.52 * pulse);
        g.addColorStop(0,   'rgba(13,100,210,0.14)');
        g.addColorStop(0.45,'rgba(10,70,160,0.05)');
        g.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }

      function tick() {
        frame_n++;
        ctx.clearRect(0, 0, W, H);

        ctx.fillStyle = '#020b18';
        ctx.fillRect(0, 0, W, H);

        drawGrid();
        drawGlow();
        drawRays();
        particles.forEach(p => { p.update(); p.draw(); });

        raf = requestAnimationFrame(tick);
      }

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function init() {
        resize();
        particles.length = 0;
        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        if (raf) cancelAnimationFrame(raf);
        tick();
      }

      window.addEventListener('resize', init);
      init();
    })();

    /* ---------------------------
       UI behaviors (toggle, tab, button ripple)
    ---------------------------- */

    // toggle password visibility
    function togglePass() {
      const ip = document.getElementById('passwordInput');
      ip.type = ip.type === 'password' ? 'text' : 'password';
    }

    // tabs (simple visual)
    function switchTab(btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // If you want to change content between tabs, do here.
    }

    // remember toggle logic + keyboard accessibility
    const rememberToggleEl = document.getElementById('rememberToggle');
    const rememberLabel = document.getElementById('rememberLabel');

    function setRemember(state) {
      if (state) {
        rememberToggleEl.classList.add('on');
        rememberLabel.setAttribute('aria-checked', 'true');
      } else {
        rememberToggleEl.classList.remove('on');
        rememberLabel.setAttribute('aria-checked', 'false');
      }
      try { localStorage.setItem('softprime_remember', state ? '1' : '0'); } catch(e){}
    }

    function toggleRemember() {
      const isOn = rememberToggleEl.classList.contains('on');
      setRemember(!isOn);
    }

    function keyToggleRemember(e) {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault(); toggleRemember();
      }
    }

    // load saved preference
    (function loadRemember() {
      try {
        const v = localStorage.getItem('softprime_remember');
        setRemember(v === '1');
      } catch(e){}
    })();

    // Forgot handler
    function onForgot(e) {
      e.preventDefault();
      alert('Ação: recuperar senha (implemente conforme seu fluxo).');
    }

    // button ripple + demo submit
    document.getElementById('submitBtn').addEventListener('click', function (e) {
      // ripple effect
      const btn = this;
      const rect = btn.getBoundingClientRect();
      const d = Math.max(rect.width, rect.height);
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = d + 'px';
      ripple.style.left = (e.clientX - rect.left - d/2) + 'px';
      ripple.style.top  = (e.clientY - rect.top  - d/2) + 'px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 800);

      // demo: read fields
      const email = document.getElementById('emailInput').value.trim();
      const pwd   = document.getElementById('passwordInput').value;
      // Replace below with real submit logic
      console.log('Login attempt', { email, pwd });
      // small feedback (demo)
      btn.disabled = true;
      btn.style.opacity = 0.9;
      setTimeout(() => { btn.disabled = false; btn.style.opacity = 1; alert('Ação de login (implemente seu fluxo)'); }, 800);
    });

    // small accessibility: Enter on password => submit
    document.getElementById('passwordInput').addEventListener('keydown', function(e){
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('submitBtn').click();
      }
    });
  </script>
</body>
</html>
